server:
  port: ${SERVER_PORT:8082}

spring:
  application:
    name: mcp-client
  ai:
    dashscope:
      api-key: ${DASHSCOPE_API_KEY:sk-****}
      chat:
        options:
          model: ${AI_MODEL:qwen-max}
    retry:
      max-attempts: 3
      initial-interval: 2000
      max-interval: 10000
      multiplier: 2
    mcp:
      client:
        enabled: true
        type: SYNC
        request-timeout: 60s
        toolcallback:
          enabled: true
        # 使用Streamable HTTP连接（无状态，适合FC环境）
        streamable-http:
          connections:
            mcp-server:
              url: http://127.0.0.1:8090
              endpoint: /mcp
